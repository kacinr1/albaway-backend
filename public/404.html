<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Faqja nuk u gjet · AlbaWay</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
body{display:flex;flex-direction:column;min-height:100vh}
.page-404{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:32px;
  position:relative;z-index:2;
}
.num-404{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(6rem,20vw,14rem);font-weight:800;line-height:1;
  background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.04));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  position:relative;margin-bottom:8px;
}
.num-404::after{
  content:'🇦🇱';
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(2rem,6vw,5rem);
  -webkit-text-fill-color:initial;
}
.err-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(1.4rem,3vw,2rem);font-weight:700;
  margin-bottom:12px;
}
.err-sub{color:rgba(255,255,255,.4);font-size:1rem;margin-bottom:40px;max-width:440px}
.err-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.err-search{
  display:flex;align-items:center;gap:0;margin-top:32px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:100px;padding:6px 6px 6px 20px;max-width:420px;width:100%;
}
.err-search input{
  flex:1;background:none;border:none;outline:none;
  color:#fff;font-size:.9rem;font-family:'Inter',sans-serif;
}
.err-search input::placeholder{color:rgba(255,255,255,.3)}
.err-search button{
  background:linear-gradient(135deg,#E41E20,#ff4444);
  color:#fff;padding:10px 20px;border-radius:100px;
  font-size:.85rem;font-weight:700;white-space:nowrap;
  box-shadow:0 0 16px rgba(228,30,32,.3);transition:all .2s;
}
.err-search button:hover{box-shadow:0 0 24px rgba(228,30,32,.5);transform:scale(1.03)}
.quick-links{margin-top:48px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.ql{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:100px;padding:8px 18px;font-size:.82rem;color:rgba(255,255,255,.55);
  transition:all .2s;text-decoration:none;display:inline-block;
}
.ql:hover{background:rgba(255,255,255,.1);color:#fff;transform:translateY(-2px)}
</style>
</head>
<body>
<div class="aurora"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div class="noise"></div>

<header id="header">
  <div class="nav-inner">
    <a class="logo" href="/"><span class="logo-flag">🇦🇱</span><span class="logo-text">Alba<strong>way</strong></span></a>
    <div class="nav-right"><a href="/" class="btn-nav-red">← Kryefaqja</a></div>
  </div>
</header>

<div class="page-404">
  <div class="num-404">404</div>
  <div class="err-title">Ups! Kjo faqe u largua si pasagjeri 😅</div>
  <p class="err-sub">Faqja që kërkuat nuk ekziston ose u zhvendos. Por mos u shqetëso — udhëtimi vazhdon!</p>

  <div class="err-btns">
    <a href="/" class="btn-publish" style="display:inline-block;text-decoration:none;padding:14px 28px;width:auto;margin:0">🏠 Kryefaqja</a>
    <a href="/?search" class="btn-see-all" style="display:inline-block;text-decoration:none;padding:14px 28px">🔍 Kërko udhëtim</a>
  </div>

  <div class="err-search">
    <input type="text" id="err-from" placeholder="Nga ku doni të udhëtoni?"/>
    <button onclick="goSearch()">→</button>
  </div>

  <div class="quick-links">
    <a href="/" class="ql">🇨🇭 Zürich → Prishtinë</a>
    <a href="/" class="ql">🇩🇪 Stuttgart → Tirana</a>
    <a href="/" class="ql">🇦🇹 Wien → Shkodër</a>
    <a href="/" class="ql">🇬🇧 London → Prishtinë</a>
    <a href="/faq.html" class="ql">❓ FAQ</a>
    <a href="/about.html" class="ql">ℹ️ Rreth nesh</a>
  </div>
</div>

<script>
function goSearch(){
  const val=document.getElementById('err-from').value.trim();
  if(val) window.location.href='/?from='+encodeURIComponent(val);
  else window.location.href='/';
}
document.getElementById('err-from').addEventListener('keydown', e => {
  if(e.key==='Enter') goSearch();
});

// Animate 404
document.addEventListener('DOMContentLoaded', () => {
  const n = document.querySelector('.num-404');
  n.style.opacity=0; n.style.transform='scale(.8)';
  requestAnimationFrame(() => {
    n.style.transition='all .8s cubic-bezier(.34,1.56,.64,1)';
    n.style.opacity=1; n.style.transform='scale(1)';
  });
});
</script>
</body>
</html>
